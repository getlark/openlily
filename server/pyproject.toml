[project]
name = "openlily"
version = "0.1.0"
description = "Voice AI bot built with Pipecat"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    # mlx-whisper is the STT used by the local brain (Apple Silicon), but
    # pipecat's whisper module imports faster-whisper at top level, so the
    # `whisper` extra is required too even though only the MLX subclass is used.
    "pipecat-ai[cartesia,kokoro,local,mcp,mlx-whisper,openai,runner,silero,webrtc,whisper]>=1.4.0",
    # Standalone WebRTC Audio Processing Module (AEC + noise suppression + AGC)
    # for the local-audio CLI run. Only rtc.AudioProcessingModule is used; no
    # LiveKit room/server/credentials are involved.
    "livekit>=1.0",
    # Exa Python SDK for the web search tools (tools/web/).
    "exa-py>=2.14.0",
    # Wake-word detection for the --mode local-with-wake-word run mode (wakeword/).
    # onnxruntime is openWakeWord's default inference backend. PyAudio (the wake
    # listener's mic backend) already comes with pipecat-ai[local] above.
    "openwakeword~=0.6",
    "onnxruntime",
    "resend>=2.30.1",
    # Parse the optional brains.yaml model/voice overrides (brains/overrides.py).
    "pyyaml>=6",
]

[dependency-groups]
dev = [
    "pyright>=1.1.404,<2",
    "ruff>=0.12.11,<1",
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["I", "UP"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "auto"
